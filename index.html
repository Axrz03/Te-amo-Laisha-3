<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para mi princesa 💖</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        background: #ffe6e6;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        font-family: 'Segoe UI', sans-serif;
    }

    #heart {
        width: 150px;
        height: 150px;
        margin-bottom: 20px;
    }

    #message {
        text-align: center;
        font-size: 1.5em;
        color: #b30059;
        max-width: 90%;
    }

    .falling-heart {
        position: absolute;
        width: 20px;
        height: 20px;
        background: pink;
        transform: rotate(-45deg);
    }

    .falling-heart::before,
    .falling-heart::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        background: pink;
        border-radius: 50%;
    }

    .falling-heart::before {
        top: -10px;
        left: 0;
    }

    .falling-heart::after {
        left: 10px;
        top: 0;
    }
</style>
</head>
<body>

<!-- Corazón SVG sólido -->
<svg id="heart" viewBox="0 0 24 24">
  <path fill="red" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 
       2 5.42 4.42 3 7.5 3c1.74 0 3.41 0.81 4.5 2.09 
       C13.09 3.81 14.76 3 16.5 3 
       19.58 3 22 5.42 22 8.5 
       c0 3.78-3.4 6.86-8.55 11.54L12 21.35z">
    <animateTransform attributeName="transform"
                      type="scale"
                      values="1;1.2;1"
                      dur="1s"
                      repeatCount="indefinite"
                      additive="sum"
                      origin="12 12"/>
  </path>
</svg>

<div id="message"></div>

<script>
// Mensaje animado
const message = "Feliz amo mucho muchote mi princesa hermosa <3";
let i = 0;
function typeWriter() {
    if (i < message.length) {
        document.getElementById("message").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 80);
    }
}
typeWriter();

// Corazones que caen al tocar la pantalla y música
let musicStarted = false;

document.body.addEventListener("click", function(e){
    // Crear corazón
    const heart = document.createElement("div");
    heart.classList.add("falling-heart");
    heart.style.left = e.clientX - 10 + "px";
    heart.style.top = "-20px";

    // Color aleatorio
    const colors = ["#ff4d6d","#ff80aa","#ff1a75","#ff3399"];
    heart.style.background = colors[Math.floor(Math.random()*colors.length)];
    heart.querySelectorAll('::before, ::after'); // pseudo-elementos se heredan

    document.body.appendChild(heart);

    // Animación suave
    let start = null;
    const duration = 4000;
    const startX = e.clientX - 10;
    const endX = startX + (Math.random()*40 - 20); // ligero movimiento horizontal
    const startY = -20;
    const endY = window.innerHeight + 20;

    function animate(timestamp){
        if(!start) start = timestamp;
        let progress = timestamp - start;
        let fraction = progress/duration;
        if(fraction>1) fraction=1;

        heart.style.top = startY + (endY-startY)*fraction + "px";
        heart.style.left = startX + (endX-startX)*fraction + "px";
        heart.style.opacity = 1 - fraction;

        if(fraction < 1){
            requestAnimationFrame(animate);
        } else {
            heart.remove();
        }
    }
    requestAnimationFrame(animate);

    // Música
    if(!musicStarted){
        const audio = new Audio('Andres Cepeda-Día Tras Día.mp3');
        audio.loop = true;
        audio.play();
        musicStarted = true;
    }
});
</script>

</body>
</html>
